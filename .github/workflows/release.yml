name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-x64
          - os: windows-latest
            target: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: Create standalone executable
        run: |
          node --experimental-sea-config sea-config.json
          cp $(command -v node || where node) godot-lsp-cli${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          npx postject godot-lsp-cli${{ matrix.os == 'windows-latest' && '.exe' || '' }} NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: godot-lsp-cli-${{ matrix.target }}
          path: godot-lsp-cli${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v6

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            godot-lsp-cli-linux-x64/godot-lsp-cli
            godot-lsp-cli-macos-x64/godot-lsp-cli
            godot-lsp-cli-windows-x64/godot-lsp-cli.exe

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
